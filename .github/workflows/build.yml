name: Build Simitone

on:
  workflow_dispatch:
    inputs:
      configuration:
        description: 'Build configuration'
        required: false
        default: 'Release'
        type: choice
        options:
          - Release
          - Debug

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Apply patches
      shell: pwsh
      run: |
        Write-Host "Applying patches to FreeSO submodule..."
        $patches = Get-ChildItem -Path . -Filter "*.patch" | Sort-Object Name
        
        if ($patches.Count -eq 0) {
          Write-Host "No patches found to apply"
          exit 0
        }
        
        cd FreeSO
        foreach ($patch in $patches) {
          $patchPath = Join-Path ".." $patch.Name
          Write-Host "Checking patch: $($patch.Name)"
          
          git apply --check $patchPath 2>&1 | Out-Null
          if ($LASTEXITCODE -eq 0) {
            git apply $patchPath
            Write-Host "✓ Successfully applied $($patch.Name)"
          } else {
            Write-Warning "✗ Patch check failed for $($patch.Name) - may already be applied or no longer needed"
          }
        }
        cd ..

    - name: Setup .NET 9
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'

    - name: Run Protobuild
      shell: pwsh
      run: |
        cd FreeSO/Other/libs/FSOMonoGame/
        ./protobuild.exe --generate
      continue-on-error: true

    - name: Restore Simitone dependencies
      run: dotnet restore Client/Simitone/Simitone.sln

    - name: Restore FreeSO dependencies
      run: dotnet restore FreeSO/TSOClient/FreeSO.sln
      continue-on-error: true

    - name: Restore Roslyn dependencies
      shell: pwsh
      run: |
        cd FreeSO/TSOClient/FSO.SimAntics.JIT.Roslyn/
        dotnet restore
      continue-on-error: true

    - name: Build
      run: dotnet build Client/Simitone/Simitone.sln -c ${{ inputs.configuration || 'Release' }} --no-restore

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: SimitoneWindows-${{ inputs.configuration || 'Release' }}
        path: Client/Simitone/Simitone.Windows/bin/${{ inputs.configuration || 'Release' }}/net9.0-windows/
        if-no-files-found: error
